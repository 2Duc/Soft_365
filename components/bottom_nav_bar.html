<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .bottom-navbar{
            overflow: hidden;
            background-color: #ffffff;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            border-top: 1px solid rgb(237, 130, 49);
            display: flex;
            justify-content: space-around;
            z-index: 1050;
        }
        .bottom-navbar a{
            color: rgb(237, 130, 49);
            float: left;
            display: block;
            text-align: center;
            text-wrap: nowrap;
            padding: 14px 35px;
            text-decoration: none;
            font-size: 17px;
        }
        @media (max-width: 480px) {
            .bottom-navbar a {
                padding: 12px 15px;
                font-size: 13px;
            }
        }
        
        @media (max-width: 380px) {
            .bottom-navbar a {
                padding: 12px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="bottom-navbar">
        <a href="#home" class="">Trang chủ</a>
        <a href="#category">Danh mục</a>
        <a href="#promotion">Khuyến mãi</a>
        <a href="#news">Tin tức</a>
        <a href="services">IT Services</a>
    </div>
</body>
